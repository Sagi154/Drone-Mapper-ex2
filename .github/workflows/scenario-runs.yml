# Optional manual workflow: run drone_mapper_simulation on ported ex1 scenario maps.
# Does not block PR CI — trigger from Actions → Scenario runs → Run workflow.
name: Scenario runs

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: "Space-separated scenario numbers to run (3 4 5)"
        default: "3 4 5"
        required: false

jobs:
  scenario-simulation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI image
        env:
          CACHE_SCOPE: drone-mapper-ex2-ci
        run: |
          set -o pipefail
          docker buildx build \
            --progress=plain \
            --load \
            --tag drone-mapper-ex2-ci:latest \
            --cache-from "type=gha,scope=${CACHE_SCOPE}" \
            --cache-to "type=gha,mode=max,scope=${CACHE_SCOPE}" \
            .

      - name: Run scenario simulations
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          for scenario in ${{ inputs.scenarios }}; do
            echo "=== Running scenario ${scenario} ==="
            out_dir="${PWD}/ci-artifacts/scenario_${scenario}"
            mkdir -p "${out_dir}"
            docker run --rm \
              -v "${out_dir}:/output" \
              -w /workspace \
              drone-mapper-ex2-ci:latest \
              ./build/ci/drone_mapper_simulation \
                /workspace/scenarios/composition_scenario${scenario}.yaml \
                /output
          done

      - name: Check mission scores
        run: |
          set -euo pipefail
          failed=0
          for scenario in ${{ inputs.scenarios }}; do
            report="ci-artifacts/scenario_${scenario}/simulation_output.yaml"
            if [[ ! -f "${report}" ]]; then
              echo "missing ${report}"
              failed=1
              continue
            fi
            if grep -q 'mission_score: -1' "${report}"; then
              echo "scenario ${scenario} reported mission_score: -1"
              failed=1
            fi
          done
          exit "${failed}"

      - name: Upload simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scenario-simulation-results
          path: ci-artifacts/
          if-no-files-found: error
