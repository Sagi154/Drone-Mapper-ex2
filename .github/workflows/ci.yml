# Runs the same Linux + vcpkg pipeline as Dockerfile (configure, build) then exercises
# the test binaries as separate CI steps so each suite surfaces individually in the UI.
name: CI

permissions:
  contents: read
  # Docker BuildKit cache backend (cache-to type=gha) uses the Actions cache API.
  actions: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # BuildKit + GitHub Actions cache backend speeds up repeated vcpkg/CMake layers.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI image (configure, build)
        env:
          CACHE_SCOPE: drone-mapper-ex2-ci
        run: |
          set -o pipefail
          mkdir -p ci-artifacts
          if ! docker buildx build \
            --progress=plain \
            --load \
            --tag drone-mapper-ex2-ci:latest \
            --cache-from "type=gha,scope=${CACHE_SCOPE}" \
            --cache-to "type=gha,mode=max,scope=${CACHE_SCOPE}" \
            . 2>&1 | tee ci-artifacts/docker-build.log; then
            echo "=== Docker build failed ==="
            grep -E 'error:|FAILED:|fatal error:' ci-artifacts/docker-build.log | tail -n 50 \
              || tail -n 100 ci-artifacts/docker-build.log
            exit 1
          fi

      # Run each labeled ctest suite separately. The labels are assigned in tests/CMakeLists.txt.
      - name: Run config tests
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ctest --test-dir build/ci -L config --output-on-failure

      - name: Run map tests
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ctest --test-dir build/ci -L map --output-on-failure

      - name: Run simulation tests
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ctest --test-dir build/ci -L simulation --output-on-failure

      - name: Run algorithm tests
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ctest --test-dir build/ci -L algorithm --output-on-failure

      - name: Run drone tests
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ctest --test-dir build/ci -L drone --output-on-failure

      - name: Run mission tests
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ctest --test-dir build/ci -L mission --output-on-failure

      - name: Run lidar tests
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ctest --test-dir build/ci -L lidar --output-on-failure

      - name: Run maps comparison tests
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ctest --test-dir build/ci -L maps-comparison --output-on-failure

      # Assignment-required single binary; smoke MockLidar filter (full umbrella run duplicates split suites).
      - name: Run umbrella simulation test
        run: |
          docker run --rm drone-mapper-ex2-ci:latest \
            ./build/ci/tests/drone_mapper_simulation_test --gtest_filter=MockLidar.*

      - name: Run scenario simulations
        run: |
          set -euo pipefail
          for scenario in 3 4 5; do
            echo "=== Running scenario ${scenario} ==="
            out_dir="${PWD}/ci-artifacts/scenario_${scenario}"
            mkdir -p "${out_dir}"
            docker run --rm \
              -v "${out_dir}:/output" \
              -w /workspace \
              drone-mapper-ex2-ci:latest \
              ./build/ci/drone_mapper_simulation \
                /workspace/scenarios/composition_scenario${scenario}.yaml \
                /output
          done

      - name: Check scenario mission scores
        run: |
          set -euo pipefail
          failed=0
          for scenario in 3 4 5; do
            report="ci-artifacts/scenario_${scenario}/simulation_output.yaml"
            echo "=== Scenario ${scenario} ==="
            if [[ ! -f "${report}" ]]; then
              echo "FAIL: missing ${report}"
              failed=1
              continue
            fi
            grep -E 'run_id:|mission_score:' "${report}" || true
            if grep -q 'mission_score: -1' "${report}"; then
              echo "FAIL: at least one run reported mission_score: -1"
              failed=1
            else
              echo "PASS: all runs scored >= 0"
            fi
          done
          exit "${failed}"

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: ci-artifacts/
          if-no-files-found: warn

      - name: Comment build errors on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('ci-artifacts/docker-build.log', 'utf8');
            const lines = log.split('\n');
            const errors = lines.filter((line) => /error:|FAILED:|fatal error:/.test(line)).slice(-50);
            const body = errors.length > 0
              ? ['## Docker build failed', '```', ...errors, '```'].join('\n')
              : ['## Docker build failed', '```', ...lines.slice(-100), '```'].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
